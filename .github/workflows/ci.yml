name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Clone erc-xochi-zkp (for contract artifacts)
        uses: actions/checkout@v4
        with:
          repository: xochi-fi/erc-xochi-zkp
          path: ../erc-xochi-zkp

      - name: Build contracts
        working-directory: ../erc-xochi-zkp
        run: forge build

      - name: Integration tests
        run: npm run test:integration
